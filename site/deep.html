<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日财经透视 - 深度版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>📈 每日财经透视</h1>
            <p class="date">2026年6月10日 星期三</p>
            <div class="mode-switcher">
                <button class="mode-btn" id="btn-brief" onclick="location.href='index.html'">📋 简报版</button>
                <button class="mode-btn active" id="btn-deep">🔍 深度版</button>
            </div>
            <p class="update-time">数据采集中，请稍后...</p>
        </div>
    </div>

    <div class="container">
        <div class="loading">
            <div class="spinner"></div>
            <p>⏳ 深度报告正在生成中...</p>
            <p style="margin-top: 8px; font-size: 0.9rem; color: var(--text-muted);">
                AI 正在深度分析产业链动态，请稍等片刻刷新页面
            </p>
        </div>

        <div class="section">
            <div class="section-header">
                <h2>📋 使用说明</h2>
            </div>
            <div class="section-body">
                <div class="news-item" style="cursor:default;">
                    <div class="item-header">
                        <span class="item-title">深度版提供 200-300 字的详细产业链分析</span>
                    </div>
                </div>
                <div class="news-item" style="cursor:default;">
                    <div class="item-header">
                        <span class="item-title">触发 GitHub Actions 后自动生成内容</span>
                    </div>
                </div>
                <div class="news-item" style="cursor:default;">
                    <div class="item-header">
                        <span class="item-title">每天 7:30 自动更新</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>每日财经透视 · AI 自动生成 · 仅供学习参考，不构成投资建议</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
