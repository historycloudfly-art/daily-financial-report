name: 每日财经报告

# 北京时间每天 7:30（UTC 23:30）触发
on:
  schedule:
    - cron: '30 23 * * *'
  # 也可以手动触发
  workflow_dispatch:

# 赋予推送代码和部署的权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-report:
    name: 采集·分析·构建
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 采集新闻
        run: python scripts/collector.py
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

      - name: AI 分析
        run: python scripts/analyzer.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 构建网页
        run: python scripts/builder.py

      - name: 提交生成的网页到仓库
        run: |
          git config user.name "每日财经透视机器人"
          git config user.email "bot@daily-financial-report"
          git add site/
          git diff --cached --quiet || git commit -m "每日财经报告自动更新 $(date +'%Y-%m-%d')"
          git push

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
